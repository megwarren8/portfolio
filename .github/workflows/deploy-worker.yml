# Publishes the contact-form API (worker/) to Cloudflare Workers on every
# push to main that touches it. Uses the same CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID secrets as deploy.yml. That token needs Account >
# Workers Scripts > Edit in addition to what deploy.yml already needs; see
# worker/README.md for the one-time setup this depends on.

name: Deploy contact API to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

concurrency:
  group: cloudflare-worker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check that Cloudflare credentials exist
        id: creds
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "CLOUDFLARE_API_TOKEN is not set on this repo yet, so the deploy is skipped."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out the repo
        if: steps.creds.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        if: steps.creds.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
